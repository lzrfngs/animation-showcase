<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copilot — Transition Prototype</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar__brand">
      <span class="brand-title">TRANSITION</span>
      <span class="brand-sub">PROTOTYPE</span>
    </div>
    <nav class="sidebar__nav" id="nav">
      <div class="nav-section__label">TRANSITIONS</div>
    </nav>
  </aside>

  <main class="main">

    <div class="viewport" id="viewport">
      <div class="mockup" id="mockup">

        <!-- Wallpaper -->
        <div class="mockup__wallpaper"></div>

        <!-- Settings panel -->
        <div class="mockup__panel" id="panel">

          <div class="mockup__sidebar" id="mockup-sidebar">
            <div class="mockup__logo">
              <div class="mockup__logo-mark"></div>
              <span class="mockup__brand" id="brand-name">Copilot</span>
            </div>
            <div class="mockup__nav-placeholder">
              <div class="mockup__np-row mockup__np-row--xs"></div>
              <div class="mockup__np-row mockup__np-row--full"></div>
              <div class="mockup__np-row mockup__np-row--full"></div>
              <div class="mockup__np-row mockup__np-row--full"></div>
              <div class="mockup__np-row mockup__np-row--xs"></div>
              <div class="mockup__np-row mockup__np-row--sm"></div>
              <div class="mockup__np-row mockup__np-row--md"></div>
              <div class="mockup__np-row mockup__np-row--xs"></div>
              <div class="mockup__np-row mockup__np-row--full"></div>
              <div class="mockup__np-row mockup__np-row--full"></div>
              <div class="mockup__np-row mockup__np-row--full"></div>
              <div class="mockup__np-row mockup__np-row--full"></div>
            </div>
          </div>

          <div class="mockup__content" id="mockup-content">
            <p class="mockup__section-label">Account</p>
            <div class="mockup__user-row">
              <div class="mockup__avatar" id="avatar"></div>
              <div class="mockup__user-info">
                <p class="mockup__user-name">Name</p>
                <p class="mockup__user-email">name@email.com</p>
              </div>
            </div>
            <div class="mockup__toggle-row">
              <span class="mockup__toggle-label">Enable Copilot <strong>Work</strong></span>
              <button class="mockup__toggle" id="toggle" type="button" aria-label="Toggle work mode">
                <div class="mockup__toggle-dot" id="toggle-dot"></div>
              </button>
            </div>

            <!-- Message box: shown mid-transition by some effects -->
            <div class="mockup__message" id="message-box">
              <p class="mockup__message-primary" id="message-primary"></p>
              <p class="mockup__message-secondary" id="message-secondary"></p>
            </div>
          </div>

        </div>

        <!-- Shared overlay: full-coverage layer transitions can use freely -->
        <div class="mockup__overlay" id="overlay"></div>

      </div>
    </div>

    <!-- Info strip -->
    <div class="info-bar">
      <span class="info-bar__name" id="transition-name"></span>
      <p class="info-bar__desc" id="transition-desc"></p>
    </div>

  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
