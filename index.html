<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation Showcase</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;700&display=swap" rel="stylesheet">

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <!-- Prism syntax highlighting -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js" defer></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar__brand">
      <span class="brand-title">ANIMATION</span>
      <span class="brand-sub">SHOWCASE</span>
    </div>
    <nav class="sidebar__nav" id="nav"></nav>
  </aside>

  <main class="main">
    <div class="demo-header">
      <div class="demo-meta">
        <span class="demo-num" id="demo-num"></span>
        <span class="demo-lib" id="demo-lib"></span>
      </div>
      <h1 class="demo-title" id="demo-title"></h1>
      <p class="demo-description" id="demo-description"></p>
    </div>

    <div class="content-row">
      <div class="demo-viewport" id="demo-viewport"></div>

      <div class="code-panel">
        <div class="code-panel__header">
          <span class="code-label">KEY CODE</span>
          <p class="code-desc" id="demo-description"></p>
        </div>
        <pre class="code-pre"><code class="language-javascript" id="code-display"></code></pre>
      </div>
    </div>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
